<section id="banner"
  style="background-image: url('assets/images/banner-img2.jpg'); background-repeat: no-repeat; background-position: center;">

  <div class="container padding-medium-2">
    <div class="hero-content text-center">
      <h2 class="display-1 text-uppercase text-light mt-5 mb-0">New Arrivals</h2>
    </div>
  </div>

</section>


<section id="shop">

  <div class="container padding-medium">

    <div class="row flex-md-row-reverse g-md-5 mb-5">

      <!-- PRODUCTS -->
      <main class="col-md-9 product-store">

        <div class="filter-shop d-md-flex justify-content-between align-items-center">

          <div class="showing-product">
            <p class="m-0">Showing {{products().length}} results</p>
          </div>

          <div class="sort-by">

            <select
              class="filter-categories bg-light p-2 rounded-2"
              (change)="sortProduct($event)">

              <option value="">Default sorting</option>
              <option value="name_asc">Name (A - Z)</option>
              <option value="name_desc">Name (Z - A)</option>
              <option value="price_low">Price (Low - High)</option>
              <option value="price_high">Price (High - Low)</option>

            </select>

          </div>

        </div>


        <div class="row">

          <!-- NO PRODUCT -->
          <div *ngIf="products().length == 0"
            class="col-12 text-center no-product">

            <br><br><br><br><br><br>
            <h4>No Products Found</h4>

          </div>


          <!-- PRODUCT LIST -->
          <div
            class="col-md-6 col-lg-4 my-4"
            *ngFor="let item of products()">

            <div class="product-item">

              <div class="image-holder">

                <img
                  [src]="item.product_images?.[0]?.image_url
                  ? 'http://127.0.0.1:8000/storage/' + item.product_images[0].image_url
                  : 'assets/images/no-image.png'"
                  [alt]="item.name"
                  class="product-image img-fluid">

              </div>

              <div class="cart-concern">
                <div class="cart-button d-flex justify-content-between align-items-center px-3">
                  <a href="javascript:void(0)" class="prod-doodle-btn" (click)="addToCart(item.id)">
                    Add To Cart
                    <i class="icon icon-arrow-io pe-1"></i>
                  </a>
                  <a [routerLink]="['/product', item.slug]" class="view-btn mt-1">
                    <i class="icon icon-screen-full"></i>
                  </a>
                  <a href="javascript:void(0)" class="add-to-wishlist-btn mt-1" (click)="addToWishlist(item.id)">
                    <i class="icon icon-heart"></i>
                  </a>
                </div>
              </div>

              <div
                class="product-detail d-flex justify-content-between align-items-center mt-2">

                <h5 class="product-title mb-0">
                  {{item.name}}
                </h5>

                <p class="m-0 fs-5 fw-normal">
                  ₹{{item.amount}}
                </p>

              </div>

            </div>

          </div>

        </div>

      </main>



      <!-- SIDEBAR -->
      <aside class="col-md-3 mt-5">

        <div class="sidebar">

          <!-- SEARCH -->
          <div class="widget-menu">

            <div class="widget-search-bar">

              <div class="search-bar border rounded-2 border-dark-subtle pe-3">

                <form class="text-center d-flex align-items-center">

                  <input
                    type="text"
                    class="form-control border-0 bg-transparent"
                    placeholder="Search for products"
                    (keyup)="searchProduct($event)">

                </form>

              </div>

            </div>

          </div>


          <!-- CATEGORIES -->
          <div class="widget-product-categories pt-5">

            <h4 class="widget-title">Categories</h4>

            <ul class="product-categories sidebar-list list-unstyled">

              <li class="cat-item">

                <a
                  href="javascript:void(0)"
                  (click)="categoryFilter('')">

                  All

                </a>

              </li>


              <li
                *ngFor="let cat of categories()"
                class="cat-item">

            <a [routerLink]="['/shop', cat.slug]">
                {{cat.name}}
              </a>

              </li>

            </ul>

          </div>


          <!-- PRICE FILTER -->
          <div class="widget-price-filter pt-3">

            <h4 class="widget-title">Filter By Price</h4>

            <ul class="product-tags sidebar-list list-unstyled">

              <li
                class="tags-item"
                (click)="priceFilter(0,500)">

                Less than ₹500

              </li>

              <li
                class="tags-item"
                (click)="priceFilter(500,1000)">

                ₹500 - ₹1000

              </li>

              <li
                class="tags-item"
                (click)="priceFilter(1000,2000)">

                ₹1000 - ₹2000

              </li>

              <li
                class="tags-item"
                (click)="priceFilter(2000,5000)">

                ₹2000 - ₹5000

              </li>

              <li
                class="tags-item"
                (click)="priceFilter(5000,0)">

                Above ₹5000

              </li>

            </ul>

          </div>

        </div>

      </aside>

    </div>

  </div>

</section>
