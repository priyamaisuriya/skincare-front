<section class="login-tabs">
  <div class="container padding-medium">
    <div class="row">
      <div class="tabs-listing">
        <nav>
          <div class="nav nav-tabs d-flex justify-content-center border-dark-subtle mb-3" id="nav-tab" role="tablist">
            <button class="nav-link account-tab mx-3 fs-4 border-bottom border-dark-subtle border-0 text-capitalize fw-semibold active" id="nav-sign-in-tab" data-bs-toggle="tab" data-bs-target="#nav-sign-in" type="button" role="tab" aria-controls="nav-sign-in" aria-selected="true" (click)="errorMessage.set(null); successMessage.set(null)">Log In</button>
            <button class="nav-link account-tab mx-3 fs-4 border-bottom border-dark-subtle border-0 text-capitalize fw-semibold" id="nav-register-tab" data-bs-toggle="tab" data-bs-target="#nav-register" type="button" role="tab" aria-controls="nav-register" aria-selected="false" tabindex="-1" (click)="errorMessage.set(null); successMessage.set(null)">Sign Up</button>
          </div>
        </nav>
        
        <div class="tab-content" id="nav-tabContent">
          <!-- LOGIN TAB -->
          <div class="tab-pane fade active show" id="nav-sign-in" role="tabpanel" aria-labelledby="nav-sign-in-tab">
            <div class="col-lg-8 offset-lg-2 mt-5">
              <p class="mb-0">Log-In With Email</p>
              <hr class="my-1">
              
              <div *ngIf="errorMessage()" class="alert alert-danger mt-3">{{ errorMessage() }}</div>
              <div *ngIf="successMessage()" class="alert alert-success mt-3">{{ successMessage() }}</div>

              <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form-group flex-wrap">
                <div class="form-input col-lg-12 my-4">
                  <input type="email" formControlName="email" placeholder="Enter email address" class="form-control mb-3 p-4" required autofocus autocomplete="username">
                  <div *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)" class="text-danger mb-2 small">
                    Please enter a valid email.
                  </div>

                  <input type="password" formControlName="password" placeholder="Enter password" class="form-control mb-3 p-4" required autocomplete="current-password">
                  
                  <label class="py-3 d-flex flex-wrap justify-content-between">
                    <div>
                      <input type="checkbox" name="remember" class="d-inline me-2">
                      <span class="label-body">Remember Me</span>
                    </div>
                    <div id="passwordHelpBlock" class="form-text">
                      <a routerLink="/forgot-password" class="text-primary fw-bold">Forgot Password?</a>
                    </div>
                  </label>
                  
                  <div class="d-grid my-3">
                    <button type="submit" class="btn btn-primary btn-lg rounded-1" [disabled]="loginForm.invalid">Log In</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <!-- REGISTER TAB -->
          <div class="tab-pane fade" id="nav-register" role="tabpanel" aria-labelledby="nav-register-tab">
            <div class="col-lg-8 offset-lg-2 mt-5">
              <p class="mb-0">Sign-Up With Email</p>
              <hr class="my-1">

              <div *ngIf="errorMessage()" class="alert alert-danger mt-3">{{ errorMessage() }}</div>
              <div *ngIf="successMessage()" class="alert alert-success mt-3">{{ successMessage() }}</div>

              <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="form-group flex-wrap">
                <div class="form-input col-lg-12 my-4">
                  <input type="text" formControlName="name" placeholder="Your full name" class="form-control mb-3 p-4" required autofocus autocomplete="name">
                  <div *ngIf="registerForm.get('name')?.invalid && (registerForm.get('name')?.dirty || registerForm.get('name')?.touched)" class="text-danger mb-2 small">
                    Name is required.
                  </div>

                  <input type="email" formControlName="email" placeholder="Your email address" class="form-control mb-3 p-4" required autocomplete="username">
                  <div *ngIf="registerForm.get('email')?.invalid && (registerForm.get('email')?.dirty || registerForm.get('email')?.touched)" class="text-danger mb-2 small">
                    Please enter a valid email.
                  </div>

                  <input type="password" formControlName="password" placeholder="Set your password" class="form-control mb-3 p-4" required autocomplete="new-password">
                  <div *ngIf="registerForm.get('password')?.invalid && (registerForm.get('password')?.dirty || registerForm.get('password')?.touched)" class="text-danger mb-2 small">
                    Password must be at least 8 characters.
                  </div>

                  <input type="password" formControlName="password_confirmation" placeholder="Retype your password" class="form-control mb-3 p-4" required autocomplete="new-password">
                  <div *ngIf="registerForm.hasError('mismatch') && registerForm.get('password_confirmation')?.touched" class="text-danger mb-2 small">
                    Passwords do not match.
                  </div>

                  <div class="d-grid my-3">
                    <button type="submit" class="btn btn-primary btn-lg rounded-1" [disabled]="registerForm.invalid">Sign Up</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
