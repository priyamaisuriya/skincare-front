<section id="banner" style="background-image:url('assets/images/banner-img2.jpg'); background-repeat: no-repeat; background-position: center;">
  <div class="container padding-medium-2">
    <div class="hero-content text-center">
      <h2 class="display-1 text-uppercase text-light mt-5 mb-0">My Profile</h2>
    </div>
  </div>
</section>

<section class="container mt-5 mb-5 pb-5">
  <div class="row">
    <!-- Profile Form -->
    <div class="col-lg-8">
      <div class="bg-white p-4 rounded shadow-sm border">
        <h3 class="mb-4">Personal Information</h3>
        <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
          <div *ngIf="message()" class="alert alert-success mb-3">{{ message() }}</div>
          <div *ngIf="error()" class="alert alert-danger mb-3">{{ error() }}</div>

          <div class="row">
            <div class="col-md-12 mb-3">
              <label class="form-label">Full Name*</label>
              <input type="text" formControlName="name" class="form-control">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input type="text" formControlName="first_name" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input type="text" formControlName="last_name" class="form-control">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Email*</label>
              <input type="email" formControlName="email" class="form-control" readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Phone Number</label>
              <input type="text" formControlName="phone_number" class="form-control">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" formControlName="address" class="form-control">
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">City</label>
              <input type="text" formControlName="city" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">State</label>
              <select formControlName="state" class="form-select">
                <option value="">Select State</option>
                <option *ngFor="let s of states()" [value]="s.id">{{ s.name }}</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Zip Code</label>
              <input type="text" formControlName="postal_code" class="form-control">
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-primary px-5 py-2 rounded-1" [disabled]="profileForm.invalid">Save Changes</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Password Change -->
    <div class="col-lg-4">
      <div class="bg-light p-4 rounded shadow-sm border sticky-top" style="top: 20px;">
        <h3 class="mb-4">Security</h3>
        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
          <div *ngIf="pwdMessage()" class="alert alert-success mb-3">{{ pwdMessage() }}</div>
          <div *ngIf="pwdError()" class="alert alert-danger mb-3">{{ pwdError() }}</div>

          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" formControlName="current_password" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" formControlName="new_password" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" formControlName="new_password_confirmation" class="form-control">
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-outline-dark py-2 rounded-1" [disabled]="passwordForm.invalid">Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
