<section id="banner"
  style="background-image:url('assets/images/banner-img2.jpg'); background-repeat: no-repeat; background-position: center;">
  <div class="container padding-medium-2">
    <div class="hero-content text-center">
      <h2 class="display-1 text-uppercase text-light mt-5 mb-0">My Orders</h2>
    </div>
  </div>
</section>

<section class="container mt-5 mb-5 pb-5">
  <div class="row">
    <div class="col-lg-12">
      <div *ngIf="isLoading()" class="text-center py-5">
        <div class="spinner-border text-dark" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <div *ngIf="!isLoading()">
        <div *ngIf="orders().length > 0" class="table-responsive shadow-sm rounded border overflow-hidden">
          <table class="table table-hover text-center align-middle mb-0">
            <thead class="bg-dark text-white text-uppercase small py-3">
              <tr>
                <th class="py-3">Order ID</th>
                <th class="py-3">Date</th>
                <th class="py-3">Total Amount</th>
                <th class="py-3">Status</th>
                <th class="py-3">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let order of orders()" class="border-bottom">
                <td class="py-3 fw-bold">#{{ order.id }}</td>
                <td class="py-3">{{ order.created_at | date: 'dd MMM yyyy' }}</td>
                <td class="py-3 fw-bold text-dark">₹{{ order.total_amount | number: '1.2-2' }}</td>
                <td class="py-3 text-center">
                  <span class="badge px-3 py-2 rounded-pill text-uppercase"
                    [ngClass]="getStatusBadgeClass(order.status)">
                    {{ order.status }}
                  </span>
                </td>
                <td class="py-3 text-center">
                  <a [routerLink]="['/order-details', order.id]" class="btn btn-sm btn-dark px-3 rounded-1">
                    View Details
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div *ngIf="orders().length === 0" class="text-center py-5 bg-light rounded border">
          <iconify-icon icon="mdi:package-variant-remove" class="display-1 text-muted mb-3"></iconify-icon>
          <h4 class="text-secondary">You haven't placed any orders yet.</h4>
          <a routerLink="/shop" class="btn btn-primary mt-3 px-4 py-2 rounded-1 text-uppercase fw-bold">Start
            Shopping</a>
        </div>
      </div>
    </div>
  </div>
</section>
